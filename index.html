<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루이스 전자점식 / 구조식 시뮬레이터</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%;
      max-width: 640px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a18;
      margin-bottom: 1.25rem;
      text-align: center;
      letter-spacing: -0.01em;
    }
    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 13px;
      color: #6b6960;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .elem-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .elem-btn {
      border: 1.5px solid #B5D4F4;
      background: #E6F1FB;
      color: #0C447C;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .elem-btn:hover { background: #B5D4F4; }
    .elem-btn.selected {
      background: #378ADD;
      border-color: #185FA5;
      color: #fff;
    }
    .mode-row {
      display: flex;
      gap: 8px;
    }
    .mode-btn {
      flex: 1;
      border: 0.5px solid #ccc;
      background: #f5f6fa;
      color: #1a1a18;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .mode-btn.active {
      background: #185FA5;
      color: #fff;
      border-color: #185FA5;
    }
    .canvas-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
    .info-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .info-chip {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 8px;
    }
    .chip-blue  { background: #E6F1FB; color: #0C447C; }
    .chip-green { background: #EAF3DE; color: #27500A; }
    .chip-amber { background: #FAEEDA; color: #633806; }
    .mol-desc {
      font-size: 13px;
      color: #6b6960;
      margin-top: 8px;
      line-height: 1.6;
    }
    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 12px;
      color: #6b6960;
      align-items: center;
      flex-wrap: wrap;
    }
    .legend-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>루이스 전자점식 · 구조식 시뮬레이터</h1>

  <div class="card">
    <div class="section-title">분자 선택</div>
    <div class="elem-grid">
      <!-- 이원자 분자 (같은 원자) -->
      <button class="elem-btn selected" onclick="selectMol(this,'H2')">H₂</button>
      <button class="elem-btn" onclick="selectMol(this,'F2')">F₂</button>
      <button class="elem-btn" onclick="selectMol(this,'Cl2')">Cl₂</button>
      <button class="elem-btn" onclick="selectMol(this,'N2')">N₂</button>
      <button class="elem-btn" onclick="selectMol(this,'O2')">O₂</button>
      <!-- B 중심 -->
      <button class="elem-btn" onclick="selectMol(this,'BF3')">BF₃</button>
      <!-- Be 중심 -->
      <button class="elem-btn" onclick="selectMol(this,'BeCl2')">BeCl₂</button>
      <!-- C 중심 -->
      <button class="elem-btn" onclick="selectMol(this,'CH4')">CH₄</button>
      <button class="elem-btn" onclick="selectMol(this,'CCl4')">CCl₄</button>
      <button class="elem-btn" onclick="selectMol(this,'CF2Cl2')">CF₂Cl₂</button>
      <button class="elem-btn" onclick="selectMol(this,'CO2')">CO₂</button>
      <button class="elem-btn" onclick="selectMol(this,'CH2O')">CH₂O</button>
      <button class="elem-btn" onclick="selectMol(this,'HCN')">HCN</button>
      <!-- HCl, PF3 -->
      <button class="elem-btn" onclick="selectMol(this,'HCl')">HCl</button>
      <button class="elem-btn" onclick="selectMol(this,'PF3')">PF₃</button>
      <!-- N 중심 -->
      <button class="elem-btn" onclick="selectMol(this,'NH3')">NH₃</button>
      <button class="elem-btn" onclick="selectMol(this,'N2H2')">N₂H₂</button>
      <button class="elem-btn" onclick="selectMol(this,'N2H4')">N₂H₄</button>
      <!-- O 중심 -->
      <button class="elem-btn" onclick="selectMol(this,'H2O')">H₂O</button>
      <button class="elem-btn" onclick="selectMol(this,'OF2')">OF₂</button>
      <button class="elem-btn" onclick="selectMol(this,'O2F2')">O₂F₂</button>
    </div>
  </div>

  <div class="card">
    <div class="mode-row">
      <button class="mode-btn active" id="btnDot" onclick="setMode('dot')">● 루이스 전자점식</button>
      <button class="mode-btn" id="btnStruct" onclick="setMode('struct')">— 루이스 구조식</button>
    </div>
  </div>

  <div class="canvas-card">
    <canvas id="drawCanvas" width="580" height="240"></canvas>
    <div class="info-row" id="infoRow"></div>
    <div class="mol-desc" id="molDesc"></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#BA7517;"></span>비공유 전자쌍</span>
      <span><span class="legend-dot" style="background:#185FA5;"></span>공유 전자쌍</span>
    </div>
  </div>

  <footer>고등학교 화학 · 루이스 전자점식 시뮬레이터</footer>
</div>

<script>
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
let currentMol = 'H2';
let currentMode = 'dot';

const DR = 2.8;
const AFONT = 'bold 28px serif';
const LFONT = '400 12px Arial, sans-serif';

function col() {
  return {
    text: '#1a1a18',
    lone: '#BA7517',
    bond: '#185FA5',
    sub:  '#6b6960',
  };
}

function clear() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
function sw(s) { ctx.font = AFONT; return ctx.measureText(s).width; }

function drawSym(x, y, s) {
  ctx.font = AFONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = col().text;
  ctx.fillText(s, x, y);
}

function dot(x, y, c) {
  ctx.beginPath();
  ctx.arc(x, y, DR, 0, Math.PI * 2);
  ctx.fillStyle = c;
  ctx.fill();
}

const HH = 12;
const PAD = 5;
const GAP = 7;

function lone(ax, ay, s, side, n) {
  const hw = sw(s) / 2;
  const c = col().lone;
  if (side === 'top')    { const y = ay - HH - PAD; n===1?dot(ax,y,c):(dot(ax-GAP/2,y,c),dot(ax+GAP/2,y,c)); }
  if (side === 'bottom') { const y = ay + HH + PAD; n===1?dot(ax,y,c):(dot(ax-GAP/2,y,c),dot(ax+GAP/2,y,c)); }
  if (side === 'left')   { const x = ax - hw - PAD; n===1?dot(x,ay,c):(dot(x,ay-GAP/2,c),dot(x,ay+GAP/2,c)); }
  if (side === 'right')  { const x = ax + hw + PAD; n===1?dot(x,ay,c):(dot(x,ay-GAP/2,c),dot(x,ay+GAP/2,c)); }
}

// 단일/이중: 그대로
function shared(x1, y1, s1, x2, y2, s2, bonds) {
  const e1 = x1 + sw(s1) / 2;
  const e2 = x2 - sw(s2) / 2;
  const mx = (e1 + e2) / 2;
  const my = (y1 + y2) / 2;
  const c = col().bond;
  const sp = 6;
  if (bonds === 1) {
    dot(mx, my - sp/2, c);
    dot(mx, my + sp/2, c);
  } else if (bonds === 2) {
    dot(mx-5, my-sp/2, c); dot(mx-5, my+sp/2, c);
    dot(mx+5, my-sp/2, c); dot(mx+5, my+sp/2, c);
  }
}

// 삼중결합: 세 쌍을 세로로 쌓기 (각 쌍은 가로 두 점)
function sharedTriple(x1, y1, s1, x2, y2, s2) {
  const e1 = x1 + sw(s1) / 2;
  const e2 = x2 - sw(s2) / 2;
  const mx = (e1 + e2) / 2;
  const my = (y1 + y2) / 2;
  const c = col().bond;
  const hp = 5;
  const vp = 7;
  dot(mx - hp, my - vp, c); dot(mx + hp, my - vp, c);
  dot(mx - hp, my,      c); dot(mx + hp, my,      c);
  dot(mx - hp, my + vp, c); dot(mx + hp, my + vp, c);
}

// 수직 공유 전자쌍
function sharedV(x1, y1, x2, y2) {
  const e1 = y1 + HH;
  const e2 = y2 - HH;
  const mx = (x1 + x2) / 2;
  const my = (e1 + e2) / 2;
  const c = col().bond;
  dot(mx - 5, my, c);
  dot(mx + 5, my, c);
}

function bondLine(x1, y1, s1, x2, y2, s2, bonds) {
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len, uy=dy/len, nx=-uy, ny=ux;
  const sx=x1+ux*(sw(s1)/2+2), sy=y1+uy*(sw(s1)/2+2);
  const ex=x2-ux*(sw(s2)/2+2), ey=y2-uy*(sw(s2)/2+2);
  const step=5;
  const offsets = bonds===1?[0]: bonds===2?[-step,step]: [-step*1.6,0,step*1.6];
  ctx.strokeStyle = col().bond;
  ctx.lineWidth = 2;
  for (const o of offsets) {
    ctx.beginPath();
    ctx.moveTo(sx+nx*o, sy+ny*o);
    ctx.lineTo(ex+nx*o, ey+ny*o);
    ctx.stroke();
  }
}

function lbl(x, y, t) {
  ctx.font = LFONT;
  ctx.fillStyle = col().sub;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t, x, y);
}

// 임의 방향 비공유 전자쌍: 원자(ax,ay)에서 각도(deg)방향으로 떨어진 위치에 점 2개
// 두 점은 방향의 수직으로 GAP만큼 벌림
function loneAngle(ax, ay, deg, color) {
  const rad = deg * Math.PI / 180;
  const dist = HH + PAD + 4;
  const cx2 = ax + dist * Math.cos(rad);
  const cy2 = ay + dist * Math.sin(rad);
  // 수직 방향
  const nx = -Math.sin(rad), ny = Math.cos(rad);
  const c = color || col().lone;
  dot(cx2 + nx * GAP/2, cy2 + ny * GAP/2, c);
  dot(cx2 - nx * GAP/2, cy2 - ny * GAP/2, c);
}

// 굽은형 공유 전자쌍: 두 원자 사이 중간에 세로 두 점
function sharedAngle(x1, y1, s1, x2, y2, s2, bonds) {
  const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
  const ux = dx/len, uy = dy/len;
  const nx = -uy, ny = ux;
  // 두 글자 가장자리에서 안쪽으로
  const e1x = x1 + ux*(sw(s1)/2), e1y = y1 + uy*(sw(s1)/2);
  const e2x = x2 - ux*(sw(s2)/2), e2y = y2 - uy*(sw(s2)/2);
  const mx = (e1x+e2x)/2, my = (e1y+e2y)/2;
  const c = col().bond;
  const sp = 6;
  if (bonds === 1) {
    // 결합 방향에 수직으로 두 점
    dot(mx + nx*sp/2, my + ny*sp/2, c);
    dot(mx - nx*sp/2, my - ny*sp/2, c);
  } else if (bonds === 2) {
    const off = 5;
    dot(mx + ux*off + nx*sp/2, my + uy*off + ny*sp/2, c);
    dot(mx + ux*off - nx*sp/2, my + uy*off - ny*sp/2, c);
    dot(mx - ux*off + nx*sp/2, my - uy*off + ny*sp/2, c);
    dot(mx - ux*off - nx*sp/2, my - uy*off - ny*sp/2, c);
  }
}

function gap(s1, s2) {
  return sw(s1)/2 + sw(s2)/2 + 14;
}

const cx0 = 290; // 캔버스 중심 x

const MOLS = {
  H2: {
    name:'수소 (H₂)', bondType:'단일결합', lonePairs:0,
    desc:'두 H 원자가 전자 1개씩 공유 → 단일결합(공유 전자쌍 1쌍). 비공유 전자쌍 없음.',
    dot() {
      const g=gap('H','H'), lx=cx0-g/2, rx=cx0+g/2, cy=120;
      shared(lx,cy,'H',rx,cy,'H',1);
      drawSym(lx,cy,'H'); drawSym(rx,cy,'H');
    },
    struct() {
      const g=gap('H','H'), lx=cx0-g/2, rx=cx0+g/2, cy=120;
      bondLine(lx,cy,'H',rx,cy,'H',1);
      drawSym(lx,cy,'H'); drawSym(rx,cy,'H');
      lbl(cx0,cy+50,'단일결합 (—), 비공유 전자쌍 없음');
    }
  },
  Cl2: {
    name:'염소 (Cl₂)', bondType:'단일결합', lonePairs:6,
    desc:'두 Cl 원자가 단일결합. 각 Cl에 비공유 전자쌍 3쌍. 옥텟 규칙 만족.',
    dot() {
      const g=gap('Cl','Cl'), lx=cx0-g/2, rx=cx0+g/2, cy=110;
      lone(lx,cy,'Cl','top',2); lone(lx,cy,'Cl','bottom',2); lone(lx,cy,'Cl','left',2);
      lone(rx,cy,'Cl','top',2); lone(rx,cy,'Cl','bottom',2); lone(rx,cy,'Cl','right',2);
      shared(lx,cy,'Cl',rx,cy,'Cl',1);
      drawSym(lx,cy,'Cl'); drawSym(rx,cy,'Cl');
    },
    struct() {
      const g=gap('Cl','Cl'), lx=cx0-g/2, rx=cx0+g/2, cy=110;
      bondLine(lx,cy,'Cl',rx,cy,'Cl',1);
      lone(lx,cy,'Cl','top',2); lone(lx,cy,'Cl','bottom',2); lone(lx,cy,'Cl','left',2);
      lone(rx,cy,'Cl','top',2); lone(rx,cy,'Cl','bottom',2); lone(rx,cy,'Cl','right',2);
      drawSym(lx,cy,'Cl'); drawSym(rx,cy,'Cl');
      lbl(cx0,cy+55,'단일결합 (—)');
    }
  },
  F2: {
    name:'불소 (F₂)', bondType:'단일결합', lonePairs:6,
    desc:'두 F 원자가 단일결합. 각 F에 비공유 전자쌍 3쌍. 옥텟 규칙 만족.',
    dot() {
      const g=gap('F','F'), lx=cx0-g/2, rx=cx0+g/2, cy=110;
      lone(lx,cy,'F','top',2); lone(lx,cy,'F','bottom',2); lone(lx,cy,'F','left',2);
      lone(rx,cy,'F','top',2); lone(rx,cy,'F','bottom',2); lone(rx,cy,'F','right',2);
      shared(lx,cy,'F',rx,cy,'F',1);
      drawSym(lx,cy,'F'); drawSym(rx,cy,'F');
    },
    struct() {
      const g=gap('F','F'), lx=cx0-g/2, rx=cx0+g/2, cy=110;
      bondLine(lx,cy,'F',rx,cy,'F',1);
      lone(lx,cy,'F','top',2); lone(lx,cy,'F','bottom',2); lone(lx,cy,'F','left',2);
      lone(rx,cy,'F','top',2); lone(rx,cy,'F','bottom',2); lone(rx,cy,'F','right',2);
      drawSym(lx,cy,'F'); drawSym(rx,cy,'F');
      lbl(cx0,cy+50,'단일결합 (—)');
    }
  },
  H2O: {
    name:'물 (H₂O)', bondType:'단일결합', lonePairs:2,
    desc:'O 중심, H 2개와 단일결합. O에 비공유 전자쌍 2쌍.',
    dot() {
      const ox=cx0-20, oy=105;
      const gH=gap('O','H'), gV=gap('O','H');
      const hRx=ox+gH, hRy=oy;      // 오른쪽 H
      const hBx=ox,    hBy=oy+gV;   // 아래 H
      lone(ox,oy,'O','top',2); lone(ox,oy,'O','left',2);
      shared(ox,oy,'O',hRx,hRy,'H',1);
      sharedV(ox,oy,hBx,hBy);
      drawSym(ox,oy,'O'); drawSym(hRx,hRy,'H'); drawSym(hBx,hBy,'H');
    },
    struct() {
      const ox=cx0-20, oy=105;
      const gH=gap('O','H'), gV=gap('O','H');
      const hRx=ox+gH, hRy=oy;
      const hBx=ox,    hBy=oy+gV;
      bondLine(ox,oy,'O',hRx,hRy,'H',1);
      bondLine(ox,oy,'O',hBx,hBy,'H',1);
      lone(ox,oy,'O','top',2); lone(ox,oy,'O','left',2);
      drawSym(ox,oy,'O'); drawSym(hRx,hRy,'H'); drawSym(hBx,hBy,'H');
      lbl(ox+30,hBy+42,'O에 비공유 전자쌍 2쌍');
    }
  },
  CO2: {
    name:'이산화탄소 (CO₂)', bondType:'이중결합', lonePairs:4,
    desc:'C 중심, 양쪽 O와 이중결합. 각 O에 비공유 전자쌍 2쌍. 직선형 구조.',
    dot() {
      const gL=gap('O','C'), gR=gap('C','O');
      const cx=cx0, cy=110, oL=cx0-gL, oR=cx0+gR;
      lone(oL,cy,'O','top',2); lone(oL,cy,'O','bottom',2);
      lone(oR,cy,'O','top',2); lone(oR,cy,'O','bottom',2);
      shared(oL,cy,'O',cx,cy,'C',2);
      shared(cx,cy,'C',oR,cy,'O',2);
      drawSym(oL,cy,'O'); drawSym(cx,cy,'C'); drawSym(oR,cy,'O');
    },
    struct() {
      const gL=gap('O','C'), gR=gap('C','O');
      const cx=cx0, cy=110, oL=cx0-gL, oR=cx0+gR;
      bondLine(oL,cy,'O',cx,cy,'C',2);
      bondLine(cx,cy,'C',oR,cy,'O',2);
      lone(oL,cy,'O','top',2); lone(oL,cy,'O','bottom',2);
      lone(oR,cy,'O','top',2); lone(oR,cy,'O','bottom',2);
      drawSym(oL,cy,'O'); drawSym(cx,cy,'C'); drawSym(oR,cy,'O');
      lbl(cx0,cy+55,'이중결합 (=)');
    }
  },
  NH3: {
    name:'암모니아 (NH₃)', bondType:'단일결합', lonePairs:1,
    desc:'N 중심, H 3개와 단일결합. N에 비공유 전자쌍 1쌍.',
    dot() {
      const gH=gap('H','N'), gV=gap('N','H');
      const nx=cx0, cy=100, hL=cx0-gH, hR=cx0+gH, hBy=cy+gV;
      lone(nx,cy,'N','top',2);
      shared(hL,cy,'H',nx,cy,'N',1);
      shared(nx,cy,'N',hR,cy,'H',1);
      sharedV(nx,cy,nx,hBy);
      drawSym(hL,cy,'H'); drawSym(nx,cy,'N'); drawSym(hR,cy,'H'); drawSym(nx,hBy,'H');
    },
    struct() {
      const gH=gap('H','N'), gV=gap('N','H');
      const nx=cx0, cy=100, hL=cx0-gH, hR=cx0+gH, hBy=cy+gV;
      bondLine(hL,cy,'H',nx,cy,'N',1);
      bondLine(nx,cy,'N',hR,cy,'H',1);
      bondLine(nx,cy,'N',nx,hBy,'H',1);
      lone(nx,cy,'N','top',2);
      drawSym(hL,cy,'H'); drawSym(nx,cy,'N'); drawSym(hR,cy,'H'); drawSym(nx,hBy,'H');
      lbl(cx0,hBy+44,'비공유 전자쌍 1쌍');
    }
  },
  CH4: {
    name:'메테인 (CH₄)', bondType:'단일결합', lonePairs:0,
    desc:'C 중심, H 4개와 단일결합. 비공유 전자쌍 없음.',
    dot() {
      const gH=gap('H','C'), gV=gap('C','H');
      const cx=cx0, cy=110, hL=cx0-gH, hR=cx0+gH, hTy=cy-gV, hBy=cy+gV;
      shared(hL,cy,'H',cx,cy,'C',1);
      shared(cx,cy,'C',hR,cy,'H',1);

      const hLx = cx0 - totalW/2;
      const nLx = hLx + gHN;
      const nRx = nLx + gNN;
      const hRx = nRx + gHN;
      bondLine(hLx,cy,'H',nLx,cy,'N',1);
      bondLine(nLx,cy,'N',nRx,cy,'N',2);
      bondLine(nRx,cy,'N',hRx,cy,'H',1);
      lone(nLx,cy,'N','top',2);
      lone(nRx,cy,'N','top',2);
      drawSym(hLx,cy,'H'); drawSym(nLx,cy,'N');
      drawSym(nRx,cy,'N'); drawSym(hRx,cy,'H');
      lbl(cx0,cy+50,'이중결합 (=), 각 N에 비공유 전자쌍 1쌍');
    }
  },

  N2H4: {
    name:'하이드라진 (N₂H₄)', bondType:'단일결합', lonePairs:2,
    desc:'H₂N-NH₂ 구조. 두 N이 단일결합. 각 N에 비공유 전자쌍 1쌍, H 2개.',
    dot() {
      const cy=110;
      const gNN=gap('N','N'), gNH=gap('N','H'), gV=gap('N','H');
      const nLx=cx0-gNN/2, nRx=cx0+gNN/2;
      // H 위아래 (왼쪽 N)
      const hLTy=cy-gV, hLBy=cy+gV;
      // H 위아래 (오른쪽 N)
      const hRTy=cy-gV, hRBy=cy+gV;
      // N-N 단일결합
      shared(nLx,cy,'N',nRx,cy,'N',1);
      // 왼쪽 N의 H 결합 (위아래)
      sharedV(nLx,hLTy,nLx,cy);
      sharedV(nLx,cy,nLx,hLBy);
      // 오른쪽 N의 H 결합 (위아래)
      sharedV(nRx,hRTy,nRx,cy);
      sharedV(nRx,cy,nRx,hRBy);
      // 각 N 비공유 전자쌍 (바깥쪽)
      lone(nLx,cy,'N','left',2);
      lone(nRx,cy,'N','right',2);
      drawSym(nLx,hLTy,'H'); drawSym(nLx,cy,'N'); drawSym(nLx,hLBy,'H');
      drawSym(nRx,hRTy,'H'); drawSym(nRx,cy,'N'); drawSym(nRx,hRBy,'H');
    },
    struct() {
      const cy=110;
      const gNN=gap('N','N'), gV=gap('N','H');
      const nLx=cx0-gNN/2, nRx=cx0+gNN/2;
      const hLTy=cy-gV, hLBy=cy+gV;
      const hRTy=cy-gV, hRBy=cy+gV;
      bondLine(nLx,cy,'N',nRx,cy,'N',1);
      bondLine(nLx,hLTy,'H',nLx,cy,'N',1);
      bondLine(nLx,cy,'N',nLx,hLBy,'H',1);
      bondLine(nRx,hRTy,'H',nRx,cy,'N',1);
      bondLine(nRx,cy,'N',nRx,hRBy,'H',1);
      lone(nLx,cy,'N','left',2);
      lone(nRx,cy,'N','right',2);
      drawSym(nLx,hLTy,'H'); drawSym(nLx,cy,'N'); drawSym(nLx,hLBy,'H');
      drawSym(nRx,hRTy,'H'); drawSym(nRx,cy,'N'); drawSym(nRx,hRBy,'H');
      lbl(cx0,hLBy+42,'각 N에 비공유 전자쌍 1쌍');
    }
  },

  O2F2: {
    name:'이불화이산소 (O₂F₂)', bondType:'단일결합', lonePairs:10,
    desc:'F-O-O-F 구조. O-O 단일결합. 각 O에 비공유 전자쌍 2쌍, 각 F에 비공유 전자쌍 3쌍.',
    dot() {
      // oL-oR 수평, fL은 oL 위, fR은 oR 아래
      const cy=125;
      const gOO=gap('O','O'), gOF=gap('O','F');
      const oLx=cx0-gOO/2, oRx=cx0+gOO/2;
      const fLx=oLx, fLy=cy-gOF;   // 왼쪽 O 위 F
      const fRx=oRx, fRy=cy+gOF;   // 오른쪽 O 아래 F
      // 공유 전자쌍
      sharedV(fLx,fLy,oLx,cy);          // F위-O 수직
      shared(oLx,cy,'O',oRx,cy,'O',1);  // O-O 수평
      sharedV(oRx,cy,fRx,fRy);          // O-F아래 수직
      // oL 비공유 전자쌍: top=F 방향이므로 bottom, left
      lone(oLx,cy,'O','bottom',2); lone(oLx,cy,'O','left',2);
      // oR 비공유 전자쌍: bottom=F 방향이므로 top, right
      lone(oRx,cy,'O','top',2); lone(oRx,cy,'O','right',2);
      // 위쪽 F (fL): top, left, right (아래=O 방향)
      lone(fLx,fLy,'F','top',2); lone(fLx,fLy,'F','left',2); lone(fLx,fLy,'F','right',2);
      // 아래쪽 F (fR): bottom, left, right (위=O 방향)
      lone(fRx,fRy,'F','bottom',2); lone(fRx,fRy,'F','left',2); lone(fRx,fRy,'F','right',2);
      drawSym(fLx,fLy,'F'); drawSym(oLx,cy,'O');
      drawSym(oRx,cy,'O'); drawSym(fRx,fRy,'F');
    },
    struct() {
      const cy=125;
      const gOO=gap('O','O'), gOF=gap('O','F');
      const oLx=cx0-gOO/2, oRx=cx0+gOO/2;
      const fLx=oLx, fLy=cy-gOF;
      const fRx=oRx, fRy=cy+gOF;
      bondLine(fLx,fLy,'F',oLx,cy,'O',1);
      bondLine(oLx,cy,'O',oRx,cy,'O',1);
      bondLine(oRx,cy,'O',fRx,fRy,'F',1);
      lone(oLx,cy,'O','bottom',2); lone(oLx,cy,'O','left',2);
      lone(oRx,cy,'O','top',2); lone(oRx,cy,'O','right',2);
      lone(fLx,fLy,'F','top',2); lone(fLx,fLy,'F','left',2); lone(fLx,fLy,'F','right',2);
      lone(fRx,fRy,'F','bottom',2); lone(fRx,fRy,'F','left',2); lone(fRx,fRy,'F','right',2);
      drawSym(fLx,fLy,'F'); drawSym(oLx,cy,'O');
      drawSym(oRx,cy,'O'); drawSym(fRx,fRy,'F');
      lbl(cx0,fRy+42,'각 O: 비공유 전자쌍 2쌍 / 각 F: 비공유 전자쌍 3쌍');
    }
  },
};

function render() {
  clear();
  const mol = MOLS[currentMol];
  if (!mol) return;
  currentMode === 'dot' ? mol.dot() : mol.struct();
  document.getElementById('infoRow').innerHTML = `
    <span class="info-chip chip-blue">${mol.name}</span>
    <span class="info-chip chip-green">결합: ${mol.bondType}</span>
    <span class="info-chip chip-amber">비공유 전자쌍: ${mol.lonePairs}쌍</span>`;
  document.getElementById('molDesc').textContent = mol.desc;
}

function selectMol(btn, key) {
  currentMol = key;
  document.querySelectorAll('.elem-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  render();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnDot').classList.toggle('active', mode === 'dot');
  document.getElementById('btnStruct').classList.toggle('active', mode === 'struct');
  render();
}

render();
</script>
</body>
</html>
